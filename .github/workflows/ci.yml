---
name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  gate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.x'
      - run: pip install pre-commit
      # Same three-check gate as local pre-commit (shellcheck --shell=sh,
      # yamllint, and the skill self-test suite) so CI and local can't drift.
      - run: pre-commit run --all-files --show-diff-on-failure

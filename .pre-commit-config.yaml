---
# Run: pre-commit install        (one-time, sets up the git hook)
#      pre-commit run --all-files (lint everything now)
repos:
  - repo: https://github.com/shellcheck-py/shellcheck-py
    rev: v0.11.0.1
    hooks:
      - id: shellcheck
        # --shell=sh honors the POSIX-sh contract (CLAUDE.md). The excludes waive
        # three known, low-severity findings in the existing skill scripts that are
        # intentional/guarded: SC2115 (rm path guarded by validated $SKILL_NAME),
        # SC2016 (literal `sh ... ` printed in a single-quoted printf format),
        # SC2329 (cleanup trap invoked indirectly via `trap`).
        args:
          - --shell=sh
          - --exclude=SC2115,SC2016,SC2329
        # Cover repo-root scripts/ (stamp-changelog.sh, assert-pack.sh), the
        # per-skill scripts/ + tests/ suites, and the top-level test/ dir. The
        # repo-root scripts/ branch was previously uncovered, so the release
        # helpers escaped the lint gate; tflow-research and tflow-skill-factory
        # keep their run-tests.sh under tests/, which the old scripts/-only glob
        # silently skipped; test/ holds the installer + stamp E2E tests. All are
        # now linted --shell=sh like every other script.
        files: ^(scripts|skills/.*/(scripts|tests)|test)/.*\.sh$
        # Fixtures under scripts/fixtures/ are test data, not source scripts. Some
        # (fail-script-syntax/scripts/broken.sh) are intentionally unparseable to
        # prove validate.sh's sh -n gate rejects them — those parse errors
        # (SC1072/SC1073) can't be waived inline, so exclude the fixture tree here.
        # validate.sh still lints fixture scripts when run-tests.sh exercises them.
        exclude: ^skills/.*/scripts/fixtures/

  - repo: https://github.com/adrienverge/yamllint
    rev: v1.38.0
    hooks:
      - id: yamllint
        args: [-c, .yamllint]

  - repo: local
    hooks:
      - id: skill-self-tests
        name: skill self-test suites (research, creator, idea, test, factory, prompt) + installer E2E
        # Run every skill's suite, not just the creator's — otherwise a
        # regression in tflow-research or tflow-skill-factory ships unseen.
        # The installer E2E test drives the real `node bin/tflow` CLI end-to-end.
        # Each script self-locates via dirname, so cwd is irrelevant.
        entry: >-
          sh -c 'for t in
          skills/tflow-research/tests/run-tests.sh
          skills/tflow-skill-creator/scripts/run-tests.sh
          skills/tflow-skill-idea/tests/run-tests.sh
          skills/tflow-skill-test/tests/run-tests.sh
          skills/tflow-skill-factory/tests/run-tests.sh
          skills/tflow-prompt/tests/run-tests.sh
          test/run-installer-tests.sh
          test/run-stamp-changelog-tests.sh;
          do printf "\n== %s ==\n" "$t"; sh "$t" || exit 1; done'
        language: system
        pass_filenames: false
        always_run: true
        # Fire on skill changes and on changes under test/ (the installer E2E
        # test + bin/tflow contract live outside skills/).
        files: ^(skills/.*\.(sh|md)|test/.*\.sh)$
